<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Malayalam — Comments</title>
<style>
  :root{--blue:#1e88e5;--bg:#f4f7ff}
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:#07203a}
  .header{background:linear-gradient(90deg,var(--blue),#0d6fd1);color:#fff;padding:22px;text-align:center}
  .wrap{max-width:820px;margin:18px auto;padding:18px}
  .box{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 8px 20px rgba(12,30,70,0.06)}
  textarea{width:100%;min-height:110px;padding:12px;border-radius:10px;border:1px solid #d6e6ff;font-size:15px}
  input[type=text]{width:100%;padding:10px;border-radius:8px;border:1px solid #d6e6ff;margin-bottom:10px}
  .btn{display:inline-block;padding:10px 14px;background:#1e88e5;color:#fff;border-radius:8px;text-decoration:none;font-weight:700;border:none;cursor:pointer}
  .small{color:#55728e;font-size:13px;margin-top:8px}
  .comment{background:#f8fbff;padding:12px;border-radius:10px;margin:8px 0;position:relative}
  .meta{font-weight:700;color:#0b2b4b}
  .reply{margin-left:12px;padding:10px;background:#ffffff;border-left:3px solid #dbeefe;border-radius:6px}
  .admin-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
  .action{position:absolute;right:10px;top:10px}
  .action button{background:transparent;border:none;color:#d23;cursor:pointer}
</style>
</head>
<body>
  <header class="header"><h1>Malayalam — Comments</h1></header>

  <main class="wrap">

    <div class="box">
      <input id="name" type="text" placeholder="Your name (Student)" />
      <textarea id="comment" placeholder="Write your comment..."></textarea>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="postComment()">Submit</button>
        <button class="btn" onclick="enterAdminMode()">Teacher/Admin Mode</button>
      </div>
      <div class="small">Comments are saved in your browser (local). Teacher/Admin mode works on this device to reply or delete comments.</div>
    </div>

    <div id="commentsList" class="box"></div>

  </main>

<script>
  // localStorage key
  const KEY = 'cat1_malayalam_comments_v1';

  // load comments
  function loadComments(){
    const raw = localStorage.getItem(KEY);
    const list = raw ? JSON.parse(raw) : [];
    const container = document.getElementById('commentsList');
    container.innerHTML='';
    if(list.length===0){ container.innerHTML = '<div class="small">No comments yet.</div>'; return; }
    list.forEach((c, idx)=>{
      const el = document.createElement('div');
      el.className='comment';
      el.innerHTML = `<div class="meta">${escapeHtml(c.name)}</div><div style="margin-top:6px">${escapeHtml(c.text)}</div><div class="small" style="margin-top:8px">Posted: ${new Date(c.ts).toLocaleString()}</div>`;
      // replies
      if(c.replies && c.replies.length){
        c.replies.forEach(r=>{
          const rdiv = document.createElement('div');
          rdiv.className='reply';
          rdiv.innerHTML = `<div style="font-weight:700;color:#0b2b4b">${escapeHtml(r.by)}</div><div style="margin-top:6px">${escapeHtml(r.text)}</div><div class="small" style="margin-top:6px">At ${new Date(r.ts).toLocaleString()}</div>`;
          el.appendChild(rdiv);
        });
      }
      // action buttons (delete/reply) shown if admin mode active
      const actions = document.createElement('div');
      actions.className='action';
      // delete btn
      const del = document.createElement('button');
      del.innerText='Delete';
      del.onclick = ()=>{ if(confirm('Delete this comment?')){ deleteComment(idx); } };
      actions.appendChild(del);
      // reply btn
      const rep = document.createElement('button');
      rep.innerText='Reply';
      rep.onclick = ()=>{ promptReply(idx); };
      actions.appendChild(rep);
      // hide by default; shown only when admin mode on
      actions.style.display = adminMode ? 'block' : 'none';
      el.appendChild(actions);

      container.appendChild(el);
    });
  }

  // post comment
  function postComment(){
    const name = document.getElementById('name').value.trim() || 'Anonymous';
    const text = document.getElementById('comment').value.trim();
    if(!text){ alert('Please type a comment'); return; }
    const raw = localStorage.getItem(KEY);
    const list = raw ? JSON.parse(raw) : [];
    list.unshift({name, text, ts:Date.now(), replies:[]});
    localStorage.setItem(KEY, JSON.stringify(list));
    document.getElementById('comment').value='';
    loadComments();
    alert('Comment added (saved in browser)');
  }

  // delete comment (admin)
  function deleteComment(idx){
    const raw = localStorage.getItem(KEY);
    const list = raw ? JSON.parse(raw) : [];
    list.splice(idx,1);
    localStorage.setItem(KEY, JSON.stringify(list));
    loadComments();
  }

  // reply (admin)
  function promptReply(idx){
    const text = prompt('Type reply text:');
    if(!text) return;
    const by = prompt('Reply as (teacher/admin name):') || 'Teacher';
    const raw = localStorage.getItem(KEY);
    const list = raw ? JSON.parse(raw) : [];
    if(!list[idx].replies) list[idx].replies = [];
    list[idx].replies.push({by, text, ts:Date.now()});
    localStorage.setItem(KEY, JSON.stringify(list));
    loadComments();
  }

  // admin mode toggle (very simple password)
  let adminMode = false;
  function enterAdminMode(){
    const pw = prompt('Enter admin password to enable teacher/admin actions:');
    // default password: "admin123" — change if you want by editing file
    if(pw === 'admin123'){
      adminMode = true;
      alert('Admin mode enabled on this device. You can reply/delete comments now.');
      loadComments();
    } else {
      alert('Wrong password.');
    }
  }

  // helper to escape HTML
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; });
  }

  // initial load
  loadComments();
</script>
</body>
</html>
