<!DOCTYPE html>
<html>
<head>
    <title>Tesla Vedha - Courses</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 20px;
            margin: 0;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .course-box {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .course-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .course-info {
            margin-bottom: 12px;
            color: #555;
        }

        button {
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>📚 Available Courses</h2>

<div class="course-box">
    <div class="course-title">KTET FULL COURSE</div>
    <div class="course-info">Duration: 4 Months | Language: Malayalam</div>
    <button onclick="alert('KTET course opened')">Open Course</button>
</div>

<div class="course-box">
    <div class="course-title">TTC/B.Ed Teacher Training</div>
    <div class="course-info">Duration: 6 Months | Malayalam</div>
    <button onclick="alert('Teacher Training opened')">Open Course</button>
</div>

<div class="course-box">
    <div class="course-title">English Communication Basic</div>
    <div class="course-info">Duration: 2 Months</div>
    <button onclick="alert('English course opened')">Open Course</button>
</div>

<div class="course-box">
    <div class="course-title">Online Tuition - Class 1 to 10</div>
    <div class="course-info">All Subjects | Kerala Syllabus</div>
    <button onclick="alert('Tuition opened')">Open Course</button>
</div>

</body>
</html>
