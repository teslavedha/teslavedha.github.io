        font-size: 30px;

    /* COURSE CARD */
    .course-card {
        background: white;

        border-radius: 16px;

        border-left: 6px solid #1a73e8;
        cursor: pointer;
        transition: 0.2s;
    }

    .course-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    .course-title {
        font-size: 22px;
        font-weight: 700;
        color: #0b2341;
        margin-bottom: 8px;
    }

    .course-tag {
        display: inline-block;
        background: #ff865e;
        color: white;
        padding: 6px 14px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: bold;
    }
</style>
