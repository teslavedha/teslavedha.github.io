<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - TESLA VEDHA</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .header {
            background: #0A5ADB;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 20px auto;
        }

        .course-card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            cursor: pointer;
            border-left: 8px solid #0A5ADB;
        }

        .course-card:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .course-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #002255;
        }

        .tag {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 13px;
            color: white;
            background: #ff7f50;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">Available Courses</div>

    <div class="container">

        <div class="course-card">
            <div class="course-title">KTET Category 1</div>
            <div class="tag">KTET Exam</div>
        </div>

        <div class="course-card">
            <div class="course-title">KTET Category 2</div>
            <div class="tag">KTET Exam</div>
        </div>

        <div class="course-card">
            <div class="course-title">KTET Category 3</div>
            <div class="tag">KTET Exam</div>
        </div>

        <div class="course-card">
            <div class="course-title">Kerala PSC – 10th Level</div>
            <div class="tag">PSC Exam</div>
        </div>

        <div class="course-card">
            <div class="course-title">Kerala PSC – Degree Level</div>
            <div class="tag">PSC Exam</div>
        </div>

        <div class="course-card">
            <div class="course-title">AI Course for Teachers</div>
            <div class="tag">Skill Upgrade</div>
        </div>

    </div>

</body>
</html>
