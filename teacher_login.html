<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Login – Tesla Vedha</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="firebase_init.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#f1f5f9}
.header{background:#2563eb;color:white;text-align:center;padding:24px 10px;font-size:20px;font-weight:600}
.box{max-width:380px;margin:30px auto;background:white;padding:22px 18px;border-radius:14px;box-shadow:0 10px 24px rgba(15,23,42,0.18)}
label{display:block;font-size:13px;margin-top:8px}
input{width:100%;padding:9px;border-radius:8px;border:1px solid #cbd5e1;font-family:Poppins}
button{width:100%;margin-top:14px;padding:10px;border-radius:10px;border:none;background:#2563eb;color:white;font-weight:600;cursor:pointer}
.msg{margin-top:10px;font-size:13px}
.error{color:#b91c1c}
a.back{display:block;margin-top:16px;font-size:13px;text-decoration:none;color:#2563eb;text-align:center}
</style>
</head>
<body>

<div class="header">Teacher Login</div>

<div class="box">
  <label>Email</label>
  <input id="email" type="email">

  <label>Password</label>
  <input id="password" type="password">

  <button onclick="loginTeacher()">Login</button>

  <div id="msg" class="msg"></div>

  <a class="back" href="index.html">← Back to Tesla Vedha</a>
</div>

<script>
async function loginTeacher(){
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value.trim();
  const msgEl = document.getElementById('msg');

  msgEl.textContent = "";
  msgEl.className = "msg";

  if(!email || !pass){
    msgEl.textContent = "Please enter email and password.";
    msgEl.classList.add("error");
    return;
  }

  try{
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    const uid  = cred.user.uid;
    const doc  = await db.collection("users").doc(uid).get();

    if(!doc.exists || doc.data().role !== "teacher"){
      msgEl.textContent = "This account is not marked as Teacher.";
      msgEl.classList.add("error");
      await auth.signOut();
      return;
    }

    window.location.href = "teacher_panel.html";
  }catch(err){
    msgEl.textContent = err.message;
    msgEl.classList.add("error");
  }
}
</script>

</body>
</html>
