<!DOCTYPE html>
<html>
<head>
<title>Teacher Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family:Poppins; background:#0659c7; height:100vh; display:flex; justify-content:center; align-items:center; }
.card { background:white; padding:25px; width:350px; border-radius:12px; box-shadow:0px 8px 20px rgba(0,0,0,0.2); }
input,button { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid #ddd; }
button { background:#2563eb; color:white; border:none; font-weight:600; }
.msg { color:red; margin-top:10px; }
</style>
</head>

<body>
<script src="firebase_init.js"></script>

<div class="card">
<h2 style="text-align:center">Teacher Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="teacherLogin()">Login</button>

<div id="msg" class="msg"></div>
</div>

<script>
async function teacherLogin(){
    let u = username.value.trim();
    let p = password.value.trim();
    msg.textContent = "";

    let snap = await db.collection("users").doc(u).get();

    if(!snap.exists){
        msg.textContent = "User not found";
        return;
    }

    let data = snap.data();

    if(data.password !== p){
        msg.textContent = "Wrong password";
        return;
    }

    if(data.role !== "teacher" && data.role !== "admin"){
        msg.textContent = "Not a teacher account";
        return;
    }

    localStorage.setItem("tv_user", JSON.stringify(data));
    window.location.href = "teacher_panel.html";
}
</script>

</body>
</html>
