<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Login | Tesla Vedha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#020617,#1e3a8a);
}

.login-box{
    width:360px;
    background:#ffffff;
    padding:28px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
    color:#1e3a8a;
}

label{
    font-weight:600;
    margin-top:12px;
    display:block;
}

input{
    width:100%;
    padding:12px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    font-size:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
}

button:hover{
    background:#1d4ed8;
}

.msg{
    margin-top:12px;
    text-align:center;
    font-weight:600;
}

.error{ color:#dc2626; }
.success{ color:#16a34a; }

.back{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}
</style>
</head>

<body>

<!-- ✅ FIREBASE INIT (MANDATORY) -->
<script src="firebase_init.js"></script>

<div class="login-box">
    <h2>Teacher Login</h2>

    <label>Username</label>
    <input id="t_user" type="text" placeholder="Teacher username">

    <label>Password</label>
    <input id="t_pass" type="password" placeholder="Password">

    <button onclick="teacherLogin()">Login</button>

    <div id="msg" class="msg"></div>

    <a class="back" href="index.html">← Back to Home</a>
</div>

<script>
async function teacherLogin(){

    const username = document.getElementById("t_user").value.trim();
    const password = document.getElementById("t_pass").value.trim();
    const msg      = document.getElementById("msg");

    msg.textContent = "";
    msg.className = "msg";

    if(!username || !password){
        msg.textContent = "Please enter username and password";
        msg.classList.add("error");
        return;
    }

    try{
        const snap = await db
            .collection("teachers")
            .where("username","==",username)
            .where("password","==",password)
            .limit(1)
            .get();

        if(!snap.empty){
            // ✅ LOGIN SUCCESS
            localStorage.setItem("teacher_logged","yes");
            localStorage.setItem("teacher_user",username);

            msg.textContent = "Login successful. Redirecting...";
            msg.classList.add("success");

            setTimeout(()=>{
                window.location.href = "teacher_panel.html";
            },800);

        }else{
            msg.textContent = "Invalid teacher username or password";
            msg.classList.add("error");
        }

    }catch(err){
        msg.textContent = "Login error: " + err.message;
        msg.classList.add("error");
    }
}
</script>

</body>
</html>
