<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Login</title>
<link rel="stylesheet" href="styles.css">

<style>
body {
    font-family: Poppins, sans-serif;
    background: #e6f2ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: white;
    width: 350px;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.login-box h2 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 20px;
}

.login-box input {
    width: 100%;
    padding: 12px;
    border: 1px solid #aaa;
    border-radius: 8px;
    margin-top: 12px;
}

.login-box button {
    width: 100%;
    padding: 12px;
    margin-top: 18px;
    background: #0077ff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

.login-box button:hover {
    background: #005fcc;
}

.error {
    color: red;
    text-align: center;
    font-weight: 600;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- LOAD FIREBASE FIRST -->
<script src="firebase_init.js"></script>

<div class="login-box">
    <h2>Teacher Login</h2>

    <label>Username</label>
    <input id="t_user" type="text" placeholder="Enter teacher username">

    <label>Password</label>
    <input id="t_pass" type="password" placeholder="Enter password">

    <button onclick="teacherLogin()">Login</button>

    <p id="msg" class="error"></p>

    <a href="index.html" style="display:block; text-align:center; margin-top:15px;">← Back to site</a>
</div>

<script>
// SIMPLE CHECK LOGIN (WILL REPLACE WITH FIREBASE LATER)
function teacherLogin() {
    const u = document.getElementById("t_user").value.trim();
    const p = document.getElementById("t_pass").value.trim();
    const msg = document.getElementById("msg");

    msg.textContent = "";

    if (u === "Vedha" && p === "122025") {
        localStorage.setItem("teacher_logged", "yes");
        window.location.href = "teacher_panel.html";
    } else {
        msg.textContent = "Invalid teacher login";
    }
}
</script>

</body>
</html>
