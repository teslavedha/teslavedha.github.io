<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Teacher Login — Tesla Vedha</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-box{max-width:700px;margin:40px auto;padding:30px;border-radius:14px;background:#fff;box-shadow:0 10px 30px rgba(2,6,23,0.06)}
    h2{color:#0b5a3c}
    label{display:block;margin-top:12px}
    input{width:100%;padding:12px;border-radius:8px;border:1px solid #e6e9ef;background:#f3f7fb}
    button{margin-top:18px;padding:12px 18px;border:none;border-radius:8px;background:#0b8d4f;color:#fff;font-weight:700}
    .error{color:#b91c1c;margin-top:12px}
  </style>
</head>
<body>
<script src="firebase_init.js"></script>

<div class="login-box" role="main">
  <h2>Teacher Login</h2>

  <label for="t_user">Email / Username</label>
  <input id="t_user" type="text" placeholder="Vedha">

  <label for="t_pass">Password</label>
  <input id="t_pass" type="password" placeholder="Password">

  <button onclick="teacherLogin()">Login</button>

  <p id="t_msg" class="error" aria-live="polite"></p>

  <a href="index.html">← Back to site</a>
</div>

<script>
function teacherLogin(){
  const u = document.getElementById('t_user').value.trim();
  const p = document.getElementById('t_pass').value.trim();
  const msg = document.getElementById('t_msg');
  msg.textContent = '';

  // DEMO teacher credentials
  if (u === 'Vedha' && p === '122025'){
    localStorage.setItem('teacher_logged', 'yes');
    window.location.href = 'teacher_panel.html';
  } else {
    msg.textContent = 'Invalid teacher login';
  }
}
</script>
</body>
</html>
