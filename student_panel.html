<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KTET Student Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#f1f5f9}
header{background:#4f46e5;color:white;padding:18px;text-align:center;font-size:22px;font-weight:600}
.container{max-width:1000px;margin:auto;padding:16px}
.box{background:white;padding:16px;border-radius:14px;margin-bottom:16px;
box-shadow:0 6px 18px rgba(0,0,0,.1)}
input,select,textarea{
width:100%;padding:8px;margin-bottom:8px;
border-radius:8px;border:1px solid #ccc}
button{
background:#4f46e5;color:white;padding:8px 14px;
border:none;border-radius:8px;font-weight:600;cursor:pointer}
.hidden{display:none}
.videoBox{margin-bottom:16px}
iframe{width:100%;height:220px;border-radius:10px;border:none}
.comment{background:#f8fafc;padding:10px;border-radius:10px;margin-bottom:8px}
.reply{color:#065f46;font-size:14px;margin-top:4px}
</style>
</head>

<body>
<header>KTET STUDENT PANEL</header>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
<h3>Student Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="err" style="color:red"></p>
</div>

<!-- STUDENT DASHBOARD -->
<div id="studentBox" class="hidden">

<div class="box">
<h3>Select</h3>
<select id="category">
  <option value="cat1">Category 1</option>
  <option value="cat2">Category 2</option>
</select>
<select id="subject">
  <option value="malayalam">Malayalam</option>
  <option value="english">English</option>
  <option value="mathematics">Mathematics</option>
  <option value="science">Science</option>
  <option value="evs">EVS</option>
  <option value="psychology">Psychology</option>
  <option value="socialscience">Social Science</option>
</select>
<button onclick="loadContent()">Load</button>
</div>

<div class="box">
<h3>🎥 Videos</h3>
<div id="videos"></div>
</div>

<div class="box">
<h3>📚 Notes (PDF)</h3>
<div id="notes"></div>
</div>

<div class="box">
<h3>❓ MCQ (PDF)</h3>
<div id="mcq"></div>
</div>

<div class="box">
<h3>💬 Comments</h3>
<textarea id="commentText" placeholder="Write a comment"></textarea>
<button onclick="postComment()">Post</button>
<div id="comments"></div>
</div>

</div>
</div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  YOUR_FIREBASE_CONFIG_HERE
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
let currentUser = null;

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(res=>{
    currentUser = res.user;
    return db.collection("users").doc(res.user.uid).get();
  })
  .then(doc=>{
    if(!doc.exists || doc.data().role!=="student"){
      err.innerText="Access denied. Not a student.";
      auth.signOut();
      return;
    }
    loginBox.classList.add("hidden");
    studentBox.classList.remove("hidden");
  })
  .catch(e=>err.innerText=e.message);
}

// LOAD CONTENT
function loadContent(){
  videos.innerHTML="";
  notes.innerHTML="";
  mcq.innerHTML="";
  comments.innerHTML="";

  const ref=db.collection("content")
    .doc(category.value)
    .collection("subjects")
    .doc(subject.value);

  ref.get().then(doc=>{
    if(!doc.exists) return;

    let d=doc.data();

    d.videos?.forEach(v=>{
      if(v)
        videos.innerHTML+=`<div class="videoBox">
          <iframe src="https://www.youtube.com/embed/${v}" allowfullscreen></iframe>
        </div>`;
    });

    d.notes?.forEach(p=>{
      if(p) notes.innerHTML+=`<a href="${p}" target="_blank">📄 View PDF</a><br>`;
    });

    d.mcq?.forEach(p=>{
      if(p) mcq.innerHTML+=`<a href="${p}" target="_blank">✅ Open MCQ</a><br>`;
    });
  });

  loadComments();
}

// COMMENTS
function postComment(){
  if(!commentText.value.trim()) return;
  db.collection("comments").add({
    category:category.value,
    subject:subject.value,
    user:currentUser.email,
    text:commentText.value,
    reply:"",
    time:new Date()
  }).then(()=>commentText.value="");
}

function loadComments(){
  db.collection("comments")
    .where("category","==",category.value)
    .where("subject","==",subject.value)
    .orderBy("time","desc")
    .onSnapshot(snap=>{
      comments.innerHTML="";
      snap.forEach(d=>{
        let c=d.data();
        comments.innerHTML+=`
          <div class="comment">
            <b>${c.user}</b><br>${c.text}
            ${c.reply?`<div class='reply'>Admin: ${c.reply}</div>`:""}
          </div>`;
      });
    });
}
</script>

</body>
</html>
