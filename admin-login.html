<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Login — Tesla Vedha</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-box{max-width:540px;margin:40px auto;padding:28px;border-radius:14px;background:#0b1520;color:#fff;box-shadow:0 12px 30px rgba(2,6,23,0.45)}
    h2{color:#00f7a1}
    input{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.04);color:#fff}
    button{margin-top:18px;padding:12px 18px;border:none;border-radius:8px;background:linear-gradient(90deg,#00f7a1,#00c2ff);color:#071018;font-weight:700}
    .error{color:#ffb4b4;margin-top:12px}
  </style>
</head>
<body>
<script src="firebase_init.js"></script>

<div class="login-box">
  <h2>Admin Login</h2>

  <label for="a_user">Username</label>
  <input id="a_user" type="text" placeholder="Tesla">

  <label for="a_pass">Password</label>
  <input id="a_pass" type="password" placeholder="Password">

  <button onclick="adminLogin()">Login</button>

  <p id="a_msg" class="error"></p>

  <a href="index.html" style="color:#8ed1ff">← Back to site</a>
</div>

<script>
function adminLogin(){
  const u = document.getElementById('a_user').value.trim();
  const p = document.getElementById('a_pass').value.trim();
  const msg = document.getElementById('a_msg');
  msg.textContent = '';

  // DEMO admin credentials (your provided)
  if (u === 'Tesla' && p === 'Tesla@12345'){
    localStorage.setItem('admin_logged', 'yes');
    window.location.href = 'admin-dashboard.html';
  } else {
    msg.textContent = 'Invalid admin login';
  }
}
</script>
</body>
</html>
