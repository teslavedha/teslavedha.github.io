<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOAD FIREBASE FIRST -->
<script src="firebase_init.js"></script>

<div class="login-box">
    <h2>Admin Login</h2>

    <label>Username</label>
    <input id="admin_user" type="text" placeholder="Enter admin username">

    <label>Password</label>
    <input id="admin_pass" type="password" placeholder="Enter password">

    <button onclick="adminLogin()">Login</button>

    <p id="msg" class="error"></p>

    <a href="index.html">← Back to site</a>
</div>

<script>
// ADMIN FIXED LOGIN
function adminLogin() {
    const user = document.getElementById("admin_user").value.trim();
    const pass = document.getElementById("admin_pass").value.trim();
    const msg  = document.getElementById("msg");

    msg.textContent = "";

    if (user === "Tesla" && pass === "291995") {
        localStorage.setItem("admin_logged", "yes");
        window.location.href = "admin_panel.html";
    } else {
        msg.textContent = "Invalid admin credentials";
    }
}
</script>

</body>
</html>
