<!DOCTYPE html>
<html>
<head>
<title>Maths Video Classes</title>
<style>
body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:#f1f5f9;
}
header{
    background:linear-gradient(90deg,#059669,#10b981);
    color:white;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:600;
    border-bottom-left-radius:15px;
    border-bottom-right-radius:15px;
}
.container{
    max-width:900px;
    margin:auto;
    padding:15px;
}
.video-box{
    background:white;
    padding:12px;
    border-radius:16px;
    margin-bottom:20px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
}
iframe{
    width:100%;
    height:220px;
    border-radius:12px;
}
</style>
</head>
<body>

<header>Mathematics – Video Classes</header>

<div class="container" id="videoList">
    Loading videos...
</div>

<script>
function loadVideos(){
    let data = localStorage.getItem("mathsVideos");
    if(!data){
        document.getElementById("videoList").innerHTML = 
            "<p>No videos saved. Open Admin Page.</p>";
        return;
    }

    let ids = JSON.parse(data);
    let html = "";

    ids.forEach(id=>{
        html += `
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
        </div>`;
    });

    document.getElementById("videoList").innerHTML = html;
}

loadVideos();
</script>

</body>
</html>
