<!DOCTYPE html>
<html>
<head>
<title>Maths Video Classes</title>
<style>
body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:#f1f5f9;
}
header{
    background:linear-gradient(90deg,#059669,#10b981);
    color:white;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:600;
    border-bottom-left-radius:15px;
    border-bottom-right-radius:15px;
}
.container{
    max-width:900px;
    margin:auto;
    padding:15px;
}
.video-box{
    background:white;
    padding:12px;
    border-radius:16px;
    margin-bottom:20px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
}
iframe{
    width:100%;
    height:220px;
    border-radius:12px;
    background:#000;
}
.placeholder{
    width:100%;
    height:220px;
    background:#d1d5db;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:16px;
    color:#4b5563;
}
</style>
</head>
<body>

<header>Mathematics – Video Classes</header>

<div class="container" id="videoList"></div>

<script>
function loadVideos(){
    let data = localStorage.getItem("mathsVideos");

    // Always create array of 10 items
    let ids = Array(10).fill("");

    if(data){
        let saved = JSON.parse(data);
        for(let i=0; i<saved.length; i++){
            ids[i] = saved[i] || "";
        }
    }

    let html = "";
    ids.forEach((id, index) => {
        html += `
        <div class="video-box">
            ${id 
                ? `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`
                : `<div class='placeholder'>Video ${index+1} Not Set</div>`
            }
        </div>`;
    });

    document.getElementById("videoList").innerHTML = html;
}

loadVideos();
</script>

</body>
</html>
