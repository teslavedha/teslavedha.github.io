<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOAD FIREBASE -->
<script src="firebase_init.js"></script>

<div class="login-box">
    <h2>Student Login</h2>

    <label>Email / Mobile</label>
    <input id="s_user" type="text" placeholder="Registered username">

    <label>Password</label>
    <input id="s_pass" type="password" placeholder="Password">

    <button onclick="studentLogin()">Login</button>

    <p id="msg" class="error"></p>

    <a href="index.html">← Back</a>
</div>

<script>
// TEMP DEMO LOGIN — WILL REPLACE WITH FIREBASE LATER
function studentLogin() {
    const u = document.getElementById("s_user").value.trim();
    const p = document.getElementById("s_pass").value.trim();
    const msg = document.getElementById("msg");

    const validUsers = ["student1@teslavedha.com", "9876543210"];
    const validPass = "Student@123";

    if (validUsers.includes(u) && p === validPass) {
        localStorage.setItem("student_logged", "yes");
        window.location.href = "student_courses.html";
    } else {
        msg.textContent = "Invalid student username or password";
    }
}
</script>

</body>
</html>
