<script>
async function studentLogin(){
    let u = username.value.trim();
    let p = password.value.trim();
    msg.textContent = "";

    // block empty input
    if(u.length !== 10){
        msg.textContent = "Invalid mobile number";
        return;
    }
    if(p.length !== 8){
        msg.textContent = "Password must be DOB (DDMMYYYY)";
        return;
    }

    let snap = await db.collection("users").doc(u).get();

    if(!snap.exists){
        msg.textContent = "❌ Student not registered. Contact Admin.";
        return;
    }

    let data = snap.data();

    if(data.role !== "student"){
        msg.textContent = "❌ This is not a student account";
        return;
    }

    if(data.password !== p){
        msg.textContent = "❌ Incorrect password";
        return;
    }

    // SUCCESS
    localStorage.setItem("tv_user", JSON.stringify(data));
    window.location.href = "student_courses.html";
}
</script>
