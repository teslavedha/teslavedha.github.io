<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login | Tesla Vedha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0a1f44,#0d47a1,#0f5fd1);
  display:flex;
  flex-direction:column;
}
header{
  padding:18px;
  background:#1e40af;
  text-align:center;
  color:white;
  font-size:20px;
  font-weight:600;
}
.box{
  background:white;
  max-width:420px;
  margin:50px auto;
  padding:28px;
  border-radius:16px;
  box-shadow:0 20px 45px rgba(0,0,0,.25);
}
label{
  font-weight:600;
  font-size:14px;
}
input{
  width:100%;
  padding:12px;
  margin:8px 0 18px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  background:#eef4ff;
  font-size:15px;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
}
button:hover{opacity:.95}
.note{
  font-size:13px;
  margin-top:16px;
  color:#475569;
}
a{
  display:block;
  text-align:center;
  margin-top:18px;
  text-decoration:none;
  color:#2563eb;
  font-weight:500;
}
</style>
</head>

<body>

<header>Student Login</header>

<div class="box">
  <label>Email / Mobile</label>
  <input id="user" placeholder="student1@teslavedha.com">

  <label>Password</label>
  <input id="pass" type="password" placeholder="Student@123">

  <button onclick="login()">Login</button>

  <div class="note">
    Registration is done only by Admin / Teacher.
  </div>

  <a href="index.html">← Back to Tesla Vedha</a>
</div>

<script>
function login(){
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value;

  const validUsers = ["student1@teslavedha.com","9876543210"];
  const validPass = "Student@123";

  if(validUsers.includes(user) && pass === validPass){
    alert("✅ Login Success");
    window.location.href = "student_panel.html";
  } else {
    alert("❌ Invalid Username or Password");
  }
}
</script>

</body>
</html>
