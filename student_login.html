<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Student Login – KTET</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#f1f5f9}
.box{
max-width:420px;margin:120px auto;
background:white;padding:20px;border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.1)}
h2{text-align:center;color:#4f46e5}
input,button{
width:100%;padding:10px;margin-top:10px;
border-radius:8px;border:1px solid #ccc}
button{background:#4f46e5;color:white;font-weight:600;border:none}
.err{color:red;text-align:center;font-size:14px}
</style>
</head>

<body>

<div class="box">
<h2>Student Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p class="err" id="msg"></p>
</div>

<script>
const firebaseConfig = {
  YOUR_FIREBASE_CONFIG_HERE
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(res=>{
    return db.collection("users").doc(res.user.uid).get();
  })
  .then(doc=>{
    if(!doc.exists || doc.data().role!=="student"){
      msg.innerText="Access denied";
      auth.signOut();
      return;
    }
    // ✅ LOGIN SUCCESS → main website
    window.location.href="index.html";
  })
  .catch(e=>msg.innerText=e.message);
}
</script>

</body>
</html>
