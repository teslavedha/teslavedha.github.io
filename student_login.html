<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Login | Tesla Vedha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0a1f44,#0d47a1);
  min-height:100vh;
}
header{
  padding:20px;
  background:#1e40af;
  color:white;
  text-align:center;
  font-weight:600;
}
.box{
  max-width:420px;
  background:#fff;
  border-radius:14px;
  padding:25px;
  margin:40px auto;
  box-shadow:0 15px 40px rgba(0,0,0,.2)
}
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  width:100%;
  margin-top:18px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:600;
  background:#16a34a;
  color:white;
}
a{display:block;text-align:center;margin-top:18px;color:#2563eb;text-decoration:none}
</style>
</head>
<body>

<header>Student Login</header>

<div class="box">
  <input placeholder="Email or Mobile">
  <input type="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <a href="index.html">← Back to Tesla Vedha</a>
</div>

<script>
function login(){
  alert("✅ Login system working.\n\nBackend (Firebase) can be connected safely later.");
}
</script>

</body>
</html>
