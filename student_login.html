<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Student Login — Tesla Vedha</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  body{font-family:Poppins,system-ui;margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#071226,#0b1220);color:#fff}
  .card{width:360px;background:#071a2b;padding:22px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.6)}
  h1{margin:0 0 14px;font-size:20px;color:#00ff9d}
  input{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none;background:rgba(255,255,255,0.03);color:#e6f0f2}
  button{width:100%;padding:12px;border-radius:8px;border:none;background:linear-gradient(90deg,#10b981,#059669);color:#fff;font-weight:700;cursor:pointer}
  .msg{margin-top:12px;color:#ffb3b3}
  a.back{display:block;margin-top:12px;text-align:center;color:#9fbfdc;text-decoration:none}
</style>
</head>
<body>

<script src="firebase_init.js"></script>

<div class="card" role="main">
  <h1>Student Login</h1>

  <label style="font-weight:600;color:#9fbfdc">Username (mobile)</label>
  <input id="username" placeholder="9876543210">

  <label style="font-weight:600;color:#9fbfdc">Password (DOB DDMMYYYY)</label>
  <input id="password" type="password" placeholder="DDMMYYYY">

  <button id="loginBtn">Login</button>

  <div id="msg" class="msg" role="status" aria-live="polite"></div>
  <a class="back" href="https://teslavedha.github.io/courses.html">← Browse courses without login</a>
</div>

<script>
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const msg = document.getElementById('msg');
    msg.textContent = '';
    if(!u || !p){ msg.textContent = 'Enter username and password'; return; }
    if(u.length !== 10){ msg.textContent = 'Enter valid 10-digit mobile number'; return; }
    if(p.length !== 8){ msg.textContent = 'Password must be DOB as DDMMYYYY'; return; }

    try{
      const userRef = db.collection('users').doc(u);
      const snap = await userRef.get();
      if(!snap.exists){ msg.textContent = 'Student not registered. Ask admin/teacher to register.'; return; }
      const data = snap.data();
      if(data.role !== 'student'){ msg.textContent = 'This account is not a student'; return; }
      if(data.password !== p){ msg.textContent = 'Incorrect password'; return; }

      // login success
      localStorage.setItem('tv_user', JSON.stringify({ username: data.username || u, role: data.role, name: data.name || u }));
      // Redirect to courses page (you chose B)
      window.location.href = 'https://teslavedha.github.io/courses.html';
    }catch(err){
      msg.textContent = 'Error: ' + (err.message || err);
    }
  });

  [document.getElementById('username'), document.getElementById('password')].forEach(inp=>{
    inp.addEventListener('keypress', (e)=>{ if(e.key === 'Enter') document.getElementById('loginBtn').click(); });
  });
</script>
</body>
</html>
