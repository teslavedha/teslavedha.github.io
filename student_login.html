<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login | Tesla Vedha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  min-height:100vh;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0a1f44,#0d47a1,#0f5fd1);
  display:flex;
  flex-direction:column;
}

/* Header */
header{
  padding:18px;
  background:#1e40af;
  text-align:center;
  color:#ffffff;
  font-size:20px;
  font-weight:600;
}

/* Center Container */
.container{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* Login Card */
.card{
  width:100%;
  max-width:420px;
  background:#ffffff;
  border-radius:16px;
  padding:28px 24px 26px;
  box-shadow:0 20px 45px rgba(15,23,42,.28);
}

/* Labels */
label{
  font-weight:600;
  font-size:14px;
  color:#0f172a;
}

/* Inputs */
input{
  width:100%;
  padding:12px;
  margin:8px 0 18px;
  border-radius:10px;
  border:1px solid #cbd5f5;
  background:#eef4ff;
  font-size:15px;
}

/* Button */
button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#ffffff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}
button:hover{opacity:.95}

/* Messages */
.msg{
  margin-top:12px;
  font-size:13px;
}
.msg.error{color:#b91c1c;}
.msg.info{color:#475569;}

/* Back link */
.back{
  display:block;
  text-align:center;
  margin-top:18px;
  text-decoration:none;
  color:#2563eb;
  font-size:13px;
  font-weight:500;
}
</style>
</head>

<body>

<header>Student Login</header>

<div class="container">
  <div class="card">

    <label>Email or Mobile</label>
    <input id="user" placeholder="student1@teslavedha.com">

    <label>Password</label>
    <input id="pass" type="password" placeholder="Student@123">

    <button onclick="studentLogin()">Login</button>

    <div id="loginMsg" class="msg"></div>

    <div class="msg info">
      New student? Account is created only by Admin / Teacher.
    </div>

    <a class="back" href="index.html">← Back to Tesla Vedha</a>

  </div>
</div>

<script>
function studentLogin(){
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();
  const msg  = document.getElementById("loginMsg");

  msg.textContent = "";
  msg.className = "msg";

  const validUsers = [
    "student1@teslavedha.com",
    "9876543210"
  ];

  const validPassword = "Student@123";

  if(validUsers.includes(user) && pass === validPassword){
    localStorage.setItem("tv_student_logged_in", "yes");
    window.location.href = "student_courses.html";
  } else {
    msg.textContent = "❌ Invalid username or password";
    msg.classList.add("error");
  }
}
</script>

</body>
</html>
