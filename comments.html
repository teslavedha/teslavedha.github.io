<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Comments</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- 🔹 COMMON FILES (ONLY ONE LINE EACH) -->
<script src="firebase_init.js"></script>
<script src="student_guard.js"></script>

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#eef2ff;
}
header{
    background:#4f46e5;
    color:white;
    padding:22px;
    text-align:center;
    font-size:22px;
    font-weight:600;
}
.container{
    max-width:900px;
    margin:auto;
    padding:12px;
}
textarea{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
    resize:none;
    font-family:Poppins;
}
button{
    background:#4f46e5;
    color:white;
    border:none;
    padding:8px 16px;
    border-radius:10px;
    margin-top:8px;
    font-weight:600;
    cursor:pointer;
}
.comment{
    background:white;
    padding:14px;
    border-radius:14px;
    margin-top:14px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}
.user{
    font-weight:600;
    color:#1e40af;
}
.time{
    font-size:12px;
    color:#666;
}
.reply{
    margin-top:8px;
    font-size:14px;
    color:#065f46;
    background:#ecfdf5;
    padding:8px;
    border-radius:8px;
}
.empty{
    text-align:center;
    font-weight:600;
    color:#555;
    margin-top:20px;
}
</style>
</head>

<body>

<header id="title">Comments</header>

<div class="container">

<textarea id="commentText" placeholder="Write your comment"></textarea>
<button onclick="postComment()">Post Comment</button>

<div id="commentList"></div>

</div>

<script>
/* 🔹 URL PARAMETERS */
const params = new URLSearchParams(window.location.search);
const category = params.get("cat");     // cat1 / cat2
const subject  = params.get("sub");     // malayalam / english etc

title.innerText =
  `${category.toUpperCase()} – ${subject.toUpperCase()} Comments`;

let currentUser = "";

/* 🔹 GET LOGGED-IN USER */
auth.onAuthStateChanged(user=>{
    currentUser = user ? user.email : "";
});

/* 🔹 POST COMMENT */
function postComment(){
    const text = commentText.value.trim();
    if(!text) return;

    db.collection("comments").add({
        category: category,
        subject: subject,
        user: currentUser,
        text: text,
        reply: "",
        time: firebase.firestore.FieldValue.serverTimestamp()
    });

    commentText.value = "";
}

/* 🔹 LOAD COMMENTS (LIVE) */
db.collection("comments")
  .where("category","==",category)
  .where("subject","==",subject)
  .orderBy("time","desc")
  .onSnapshot(snapshot => {

    commentList.innerHTML = "";

    if(snapshot.empty){
        commentList.innerHTML =
          `<div class="empty">No comments yet</div>`;
        return;
    }

    snapshot.forEach(doc=>{
        const c = doc.data();
        const t = c.time ? c.time.toDate().toLocaleString() : "";

        commentList.innerHTML += `
          <div class="comment">
            <div class="user">${c.user}</div>
            <div class="time">${t}</div>
            <div>${c.text}</div>
            ${
              c.reply
              ? `<div class="reply">Admin: ${c.reply}</div>`
              : ``
            }
          </div>
        `;
    });
  });
</script>

</body>
</html>
