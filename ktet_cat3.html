<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTET Category 3</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
        color: white;
    }

    .header {
        text-align: center;
        padding: 25px 10px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .header h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 1px;
    }

    .container {
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .subject-card {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 20px;
        text-align: center;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        transition: 0.3s;
        cursor: pointer;
    }

    .subject-card:hover {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.15);
    }

    .subject-title {
        font-size: 18px;
        margin-top: 10px;
        font-weight: 600;
    }

    .icon {
        font-size: 40px;
    }
</style>

</head>
<body>

<div class="header">
    <h1>KTET CATEGORY 3 – SUBJECTS</h1>
</div>

<div class="container">

    <a href="malayalam_class.html" style="text-decoration:none; color:white;">
        <div class="subject-card">
            <div class="icon">📘</div>
            <div class="subject-title">Malayalam</div>
        </div>
    </a>

    <a href="english_class.html" style="text-decoration:none; color:white;">
        <div class="subject-card">
            <div class="icon">📗</div>
            <div class="subject-title">English</div>
        </div>
    </a>

    <a href="psychology_class.html" style="text-decoration:none; color:white;">
        <div class="subject-card">
            <div class="icon">🧠</div>
            <div class="subject-title">Psychology</div>
        </div>
    </a>

    <a href="physics_class.html" style="text-decoration:none; color:white;">
        <div class="subject-card">
            <div class="icon">⚛️</div>
            <div class="subject-title">Physics</div>
        </div>
    </a>

    <a href="social_science_class.html" style="text-decoration:none; color:white;">
