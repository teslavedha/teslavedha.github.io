<!doctype html>
<html>
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>English — Videos</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
 body{font-family:Poppins, sans-serif;margin:0;background:#f7f7ff}
 header{background:linear-gradient(90deg,#6d28d9,#8b5cf6);color:#fff;padding:18px;text-align:center;border-bottom-left-radius:14px;border-bottom-right-radius:14px}
 .container{max-width:980px;margin:18px auto;padding:12px}
 .video-card{background:#fff;border-radius:12px;padding:12px;margin-bottom:14px;box-shadow:0 6px 18px rgba(2,6,23,0.05)}
 iframe{width:100%;height:220px;border-radius:10px;border:0}
 .placeholder{height:220px;border-radius:10px;background:#e6e9ef;display:flex;align-items:center;justify-content:center;color:#64748b;font-weight:700}
</style>
</head>
<body>
<header><strong>English — Video Classes</strong></header>
<div class="container" id="videos"></div>

<script>
const SUBJECT='english';
const storageKey='ktet_cat1_data_v1';

function load(){
  const raw=localStorage.getItem(storageKey);
  const data = raw ? JSON.parse(raw) : {};
  const arr = (data[SUBJECT] && data[SUBJECT].videos) ? data[SUBJECT].videos : Array(10).fill('');
  const container=document.getElementById('videos');
  let html='';
  for(let i=0;i<10;i++){
    const id = arr[i]||'';
    html += `<div class="video-card">` + (id
      ? `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`
      : `<div class="placeholder">Video ${i+1} Not Set</div>`
    ) + `</div>`;
  }
  container.innerHTML=html;
}
load();
</script>
</body>
</html>
