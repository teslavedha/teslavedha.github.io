<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malayalam – KTET Category 1</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e6f0ff, #f6fbff);
        }

        /* Header */
        .header {
            background: #1678f2;
            color: white;
            padding: 22px;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
        }

        .container {
            padding: 20px;
        }

        /* Glass Cards */
        .card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 18px 20px;
            margin: 18px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.55);
        }

        .icon {
            font-size: 28px;
        }

        .text {
            font-size: 20px;
            font-weight: 600;
            color: #0b2d57;
        }
    </style>
</head>

<body>

    <div class="header">Malayalam – KTET Category 1</div>

    <div class="container">

        <div class="card" onclick="location.href='videos_malayalam.html'">
            <div class="icon">🎥</div>
            <div class="text">Video Classes</div>
        </div>

        <div class="card" onclick="location.href='pdf_malayalam.html'">
            <div class="icon">📄</div>
            <div class="text">PDF Notes</div>
        </div>

        <div class="card" onclick="location.href='mcq_malayalam.html'">
            <div class="icon">❓</div>
            <div class="text">MCQ Practice</div>
        </div>

        <div class="card" onclick="location.href='reviews_malayalam.html'">
            <div class="icon">💬</div>
            <div class="text">Comments / Reviews</div>
        </div>

    </div>

</body>
</html>
