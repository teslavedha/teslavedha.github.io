<!DOCTYPE html>
<html>
<head>
    <title>Class Videos</title>
    <style>
        body { font-family: Arial; padding: 20px; background:#fff0f6; }
        .video-box { margin-bottom: 20px; background: #ffccdd; padding: 15px; border-radius: 12px; }
        iframe { width: 100%; height: 315px; border-radius: 12px; border: none; }
    </style>
</head>

<body>

<h2 id="class-title"></h2>
<div id="video-container">Loading...</div>

<script>
    const classNumber = 3;  // CHANGE for each file

    document.getElementById("class-title").innerText = "Class " + classNumber;

    fetch("videos.json")
        .then(res => res.json())
        .then(data => {
            const videos = data["class" + classNumber];
            const container = document.getElementById("video-container");

            if (!videos || videos.length === 0) {
                container.innerHTML = "<p>No videos added yet.</p>";
                return;
            }

            container.innerHTML = "";
            videos.forEach(video => {
                container.innerHTML += 
                    <div class="video-box">
                        <h3>${video.title}</h3>
                        <iframe src="${video.url}" allowfullscreen></iframe>
                    </div>
                ;
            });
        });
</script>

</body>
</html>
