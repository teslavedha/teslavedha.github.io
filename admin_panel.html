<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KTET Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#f1f5f9}
header{background:#1e40af;color:white;padding:18px;text-align:center;font-size:22px;font-weight:600}
.container{max-width:1100px;margin:auto;padding:16px}
.box{background:white;padding:16px;border-radius:14px;margin-bottom:16px;
box-shadow:0 6px 18px rgba(0,0,0,.1)}
h3{margin-top:0;color:#1e40af}
input,select{
width:100%;padding:8px;margin-bottom:8px;
border-radius:8px;border:1px solid #ccc}
button{
background:#1e40af;color:white;padding:8px 14px;
border:none;border-radius:8px;font-weight:600;margin-right:6px;cursor:pointer}
.danger{background:#dc2626}
.hidden{display:none}
</style>
</head>

<body>
<header>KTET ADMIN PANEL (Firebase)</header>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
<h3>Admin Login</h3>
<input id="email" placeholder="Admin Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminBox" class="hidden">

<!-- USER MANAGEMENT -->
<div class="box">
<h3>User Management</h3>

<select id="role">
  <option value="teacher">Teacher</option>
  <option value="student">Student</option>
</select>

<input id="newEmail" placeholder="Email">
<input id="newPass" type="password" placeholder="Password">

<button onclick="addUser()">Add User</button>
<button class="danger" onclick="removeUser()">Remove User</button>
</div>

<!-- CONTENT MANAGEMENT -->
<div class="box">
<h3>Content Management</h3>

<select id="category">
<option value="cat1">Category 1</option>
<option value="cat2">Category 2</option>
</select>

<select id="subject">
<option value="malayalam">Malayalam</option>
<option value="english">English</option>
<option value="mathematics">Mathematics</option>
<option value="science">Science</option>
<option value="evs">EVS</option>
<option value="psychology">Psychology</option>
<option value="socialscience">Social Science</option>
</select>

<h4>Videos (YouTube URLs – 10)</h4>
<div id="videos"></div>

<h4>Notes PDFs (5)</h4>
<div id="notes"></div>

<h4>MCQ PDFs (5)</h4>
<div id="mcq"></div>

<button onclick="saveContent()">Save Content</button>
</div>

</div>
</div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  YOUR_FIREBASE_CONFIG_HERE
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 🔐 LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>adminBox.classList.remove("hidden"))
  .catch(e=>alert(e.message));
}

// 👩‍🏫👨‍🎓 ADD USER
function addUser(){
  auth.createUserWithEmailAndPassword(newEmail.value,newPass.value)
  .then(cred=>{
    return db.collection("users").doc(cred.user.uid).set({
      role: role.value,
      email: newEmail.value
    });
  }).then(()=>alert("User added"))
  .catch(e=>alert(e.message));
}

// ❌ REMOVE USER
function removeUser(){
  alert("User removal requires Firebase Admin SDK (backend). You can disable user instead.");
}

// 🧱 INPUT CREATION
function makeInputs(id,count){
  let box=document.getElementById(id);
  for(let i=1;i<=count;i++)
    box.innerHTML+=`<input id="${id}${i}" placeholder="${id.toUpperCase()} ${i} URL">`;
}
makeInputs("videos",10);
makeInputs("notes",5);
makeInputs("mcq",5);

// 💾 SAVE CONTENT
function saveContent(){
  const ref=db.collection("content")
  .doc(category.value)
  .collection("subjects")
  .doc(subject.value);

  let data={
    videos:[],notes:[],mcq:[]
  };

  for(let i=1;i<=10;i++)
    data.videos.push(videos["videos"+i].value);

  for(let i=1;i<=5;i++){
    data.notes.push(notes["notes"+i].value);
    data.mcq.push(mcq["mcq"+i].value);
  }

  ref.set(data).then(()=>alert("Content saved"));
}
</script>

</body>
</html>
