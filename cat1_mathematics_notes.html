<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematics – PDF Notes</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #edf8f5;
            margin: 0;
        }

        header {
            background: linear-gradient(90deg, #059669, #10b981);
            padding: 20px;
            color: white;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 15px;
        }

        .note-card {
            background: white;
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
        }

        .title {font-weight: 600; font-size: 16px; color: #065f46;}
        .desc {font-size: 14px; color: #4b5563;}

        .btn {
            display: inline-block;
            margin-top: 10px;
            background: #059669;
            padding: 8px 16px;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

<header>Mathematics – PDF Notes</header>

<div class="container">

    <div class="note-card">
        <div class="title">Complete Mathematics Notes</div>
        <div class="desc">Download the full PDF (All chapters)</div>
        <a class="btn" href="#">Download PDF</a>
    </div>

</div>

</body>
</html>
