<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTET Category 1 - Subjects</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #d7e8ff, #f3f8ff);
        }

        .header {
            background: #1678f2;
            color: white;
            padding: 25px;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
        }

        .container {
            padding: 20px;
        }

        /* Glassmorphic Subject Cards */
        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            padding: 20px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.10);
        }

        .sub-name {
            font-size: 22px;
            font-weight: 600;
            color: #222;
        }

        .open-btn {
            background: #0f8f4d;
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 18px;
            border: none;
            cursor: pointer;
        }

        .open-btn:hover {
            background: #0b703c;
        }
    </style>
</head>

<body>

    <div class="header">KTET Category 1 – Subjects</div>

    <div class="container">

        <div class="card">
            <div class="sub-name">Malayalam</div>
            <button class="open-btn" onclick="location.href='malayalam.html'">Open</button>
        </div>

        <div class="card">
            <div class="sub-name">English</div>
            <button class="open-btn" onclick="location.href='english.html'">Open</button>
        </div>

        <div class="card">
            <div class="sub-name">Mathematics</div>
            <button class="open-btn" onclick="location.href='maths.html'">Open</button>
        </div>

        <div class="card">
            <div class="sub-name">EVS</div>
            <button class="open-btn" onclick="location.href='evs.html'">Open</button>
        </div>

        <div class="card">
            <div class="sub-name">Psychology</div>
            <button class="open-btn" onclick="location.href='psychology.html'">Open</button>
        </div>

    </div>

</body>
</html>
