<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTET Category 1 – Subjects</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #f1f4ff;
        }

        header {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            color: white;
            text-align: center;
            padding: 25px 10px;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.25);
        }

        .container {
            max-width: 900px;
            margin: 25px auto;
            padding: 10px;
        }

        .subject-card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.25s;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
        }

        .subject-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        }

        .subject-info {
            font-size: 20px;
            font-weight: 600;
            color: #1e3a8a;
        }

        .subject-desc {
            font-size: 14px;
            color: #444;
            margin-top: 3px;
        }

        .open-btn {
            background: #10b981;
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 3px 6px rgba(16,185,129,0.35);
        }

        .open-btn:hover {
            background: #059669;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<header>KTET Category 1 – Subjects</header>

<div class="container">

    <!-- Malayalam -->
    <div class="subject-card">
        <div>
            <div class="subject-info">Malayalam</div>
            <div class="subject-desc">Video classes, notes & MCQ practice</div>
        </div>
        <a class="open-btn" href="cat1_malayalam.html">Open</a>
    </div>

    <!-- English -->
    <div class="subject-card">
        <div>
            <div class="subject-info">English</div>
            <div class="subject-desc">Grammar, language & pedagogy</div>
        </div>
        <a class="open-btn" href="cat1_english.html">Open</a>
    </div>

    <!-- Mathematics -->
    <div class="subject-card">
        <div>
            <div class="subject-info">Mathematics</div>
            <div class="subject-desc">Concepts, examples & practice</div>
        </div>
        <a class="open-btn" href="cat1_mathematics.html">Open</a>
    </div>

    <!-- EVS -->
    <div class="subject-card">
        <div>
            <div class="subject-info">EVS</div>
            <div class="subject-desc">Environmental studies + pedagogy</div>
        </div>
        <a class="open-btn" href="cat1_evs.html">Open</a>
    </div>

    <!-- Psychology -->
    <div class="subject-card">
        <div>
            <div class="subject-info">Psychology</div>
            <div class="subject-desc">Teacher skills, child development</div>
        </div>
        <a class="open-btn" href="cat1_psychology.html">Open</a>
    </div>

</div>

</body>
</html>
