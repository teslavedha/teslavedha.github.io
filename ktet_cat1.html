<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTET Category 1 – Subjects</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #eef3ff;
        }

        header {
            background: #1e40af;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            padding: 15px;
        }

        .subject-card {
            background: white;
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .subject-info {
            font-size: 18px;
            font-weight: 600;
        }

        .subject-desc {
            font-size: 14px;
            color: #555;
        }

        .open-btn {
            background: #0b3d0b;
            color: white;
            padding: 10px 22px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
        }

        .open-btn:hover {
            background: #145214;
        }
    </style>
</head>

<body>

<header>KTET Category 1 – Subjects</header>

<div class="container">

    <!-- Malayalam -->
    <div class="subject-card">
        <div>
            <div class="subject-info">Malayalam</div>
            <div class="subject-desc">Video classes, notes & MCQ</div>
        </div>
        <a class="open-btn" href="malayalam.html">Open</a>
    </div>

    <!-- English -->
    <div class="subject-card">
        <div>
            <div class="subject-info">English</div>
            <div class="subject-desc">Language & pedagogy</div>
        </div>
        <a class="open-btn" href="english.html">Open</a>
    </div>

    <!-- Mathematics -->
    <div class="subject-card">
        <div>
            <div class="subject-info">Mathematics</div>
            <div class="subject-desc">Concepts + practice</div>
        </div>
        <a class="open-btn" href="mathematics.html">Open</a>
    </div>

    <!-- EVS -->
    <div class="subject-card">
        <div>
            <div class="subject-info">EVS</div>
            <div class="subject-desc">Environmental studies</div>
        </div>
        <a class="open-btn" href="evs.html">Open</a>
    </div>

    <!-- Psychology -->
    <div class="subject-card">
        <div>
            <div class="subject-info">Psychology</div>
            <div class="subject-desc">Theory & teacher skills</div>
        </div>
        <a class="open-btn" href="psychology.html">Open</a>
    </div>

</div>

</body>
</html>
