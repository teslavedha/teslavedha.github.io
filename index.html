<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tesla Vedha Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:'Poppins', system-ui, sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#1e3a8a,#2563eb);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .login-card{
      background:#ffffff;
      border-radius:18px;
      padding:36px 28px 30px;
      width:92%;
      max-width:420px;
      text-align:center;
      box-shadow:0 25px 50px rgba(0,0,0,0.28);
    }

    /* LOGO SECTION */
    .logo-section{
      margin-bottom:20px;
    }

    .logo-section img{
      width:80px;
      height:auto;
      margin-bottom:10px;
    }

    .brand-name{
      font-size:26px;
      font-weight:700;
      color:#1e3a8a;
      margin:0;
    }

    .tagline{
      font-size:13px;
      color:#64748b;
      margin-top:4px;
    }

    .divider{
      height:1px;
      background:#e5e7eb;
      margin:22px 0;
    }

    .btn{
      display:block;
      width:100%;
      padding:14px;
      border-radius:10px;
      font-size:15px;
      font-weight:600;
      color:#ffffff;
      text-decoration:none;
      margin-bottom:12px;
      transition:transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(0,0,0,0.18);
    }

    .student-btn{ background:#16a34a; }
    .teacher-btn{ background:#2563eb; }
    .admin-btn{ background:#dc2626; }

    .note{
      font-size:12px;
      color:#6b7280;
      margin-top:14px;
      line-height:1.4;
    }
  </style>
</head>

<body>

  <div class="login-card">

    <!-- LOGO + BRAND -->
    <div class="logo-section">
      <img src="assets/logo.jpg" alt="Tesla Vedha Logo">
      <div class="brand-name">Tesla Vedha</div>
      <div class="tagline">KTET · PSC · AI Learning Academy</div>
    </div>

    <div class="divider"></div>

    <!-- LOGIN BUTTONS -->
    <a class="btn student-btn" href="student_login.html">Student Login</a>
    <a class="btn teacher-btn" href="teacher_login.html">Teacher Login</a>
    <a class="btn admin-btn" href="admin-login.html">Admin Login</a>

    <div class="note">
      Student and Teacher accounts are created and managed only by authorised
      Admins / Teachers.
    </div>

  </div>

</body>
</html>
