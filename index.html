<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tesla Vedha | Learning Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#0a1f44,#0d47a1,#0f5fd1);
  display:flex;
  align-items:center;
  justify-content:center;
}
.card{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(14px);
  border-radius:18px;
  padding:30px;
  box-shadow:0 30px 60px rgba(0,0,0,0.35);
  color:#fff;
  text-align:center;
}
.logo{
  width:110px;
  height:110px;
  border-radius:18px;
  background:rgba(255,255,255,0.12);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
}
.logo img{
  width:70px;
}
h1{margin:0;font-size:26px;font-weight:700}
.sub{opacity:.85;font-size:14px;margin:6px 0 22px}

.btn{
  display:block;
  width:100%;
  padding:14px;
  border-radius:12px;
  margin:12px 0;
  font-weight:600;
  text-decoration:none;
  color:white;
  transition:.25s;
}
.student{background:linear-gradient(135deg,#22c55e,#16a34a)}
.teacher{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.admin{background:linear-gradient(135deg,#ef4444,#b91c1c)}
.btn:hover{transform:translateY(-2px);opacity:.95}

.note{
  font-size:12px;
  opacity:.8;
  margin-top:18px;
}
</style>
</head>

<body>
  <div class="card">
    <div class="logo">
      <img src="assets/logo.jpg">
    </div>

    <h1>Tesla Vedha</h1>
    <div class="sub">KTET · PSC · AI Learning Academy</div>

    <a class="btn student" href="student_login.html">Student Login</a>
    <a class="btn teacher" href="teacher_login.html">Teacher Login</a>
    <a class="btn admin" href="admin_login.html">Admin Login</a>

    <div class="note">
      Accounts are created only by authorised Admin / Teachers
    </div>
  </div>
</body>
</html>
