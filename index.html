<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teslavedha Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #0d0d0d, #1a1a1a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-box {
            width: 350px;
            background: #111;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 2px solid #444;
        }

        h2 {
            margin: 10px 0 25px;
            font-weight: 600;
            font-size: 22px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            font-size: 15px;
        }

        input:focus {
            outline: 2px solid #555;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0066ff;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #0053cc;
        }

        .error-text {
            color: #ff4444;
            margin-top: 8px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <!-- Your logo file inside GitHub -->
        <img src="photo_2025-11-19_13-35-50.jpg" class="logo" alt="Logo">

        <h2>TESLAVEDHA LOGIN</h2>

        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>

        <p id="error" class="error-text">Invalid username or password</p>
    </div>


    <script>
        function login() {
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;
            const error = document.getElementById("error");

            // TEMP CREDENTIALS FOR TESTING
            if (u === "test" && p === "1234") {
                window.location.href = "courses.html";
            } else {
                error.style.display = "block";
            }
        }
    </script>

</body>
</html>
