<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tesla Vedha Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#1e3a8a;
  --green:#16a34a;
  --red:#dc2626;
  --text:#0f172a;
  --muted:#64748b;
}

*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  font-family:'Poppins',system-ui,sans-serif;

  /* ✅ PREMIUM LIGHT BACKGROUND */
  background:
    radial-gradient(800px 300px at 20% 0%, #dbeafe, transparent 60%),
    radial-gradient(600px 300px at 90% 80%, #e0f2fe, transparent 60%),
    linear-gradient(180deg, #f8fafc, #eef2f7);

  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px;
}

/* MAIN CARD */
.portal{
  width:100%;
  max-width:460px;
  background:#ffffff;
  border-radius:28px;
  padding:30px 26px 28px;
  box-shadow:
    0 30px 60px rgba(15,23,42,.12),
    inset 0 1px 0 rgba(255,255,255,.7);
  text-align:center;
}

/* LOGO */
.logo-frame{
  width:92px;
  height:92px;
  margin:0 auto 14px;
  border-radius:22px;
  background:linear-gradient(145deg,#111827,#1f2937);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 14px 28px rgba(0,0,0,.25);
}
.logo-frame img{
  width:58px;
  height:auto;
}

/* TEXT */
.brand{
  font-size:28px;
  font-weight:700;
  color:var(--blue);
}
.tagline{
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}

.divider{
  height:1px;
  background:#e5e7eb;
  margin:20px 0;
}

/* BUTTONS */
.actions{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.actions a{
  padding:15px;
  border-radius:14px;
  font-size:15px;
  font-weight:600;
  color:#ffffff;
  text-decoration:none;
  box-shadow:0 12px 24px rgba(15,23,42,.18);
  transition:transform .15s ease, box-shadow .15s ease;
}
.actions a:hover{
  transform:translateY(-2px);
  box-shadow:0 18px 32px rgba(15,23,42,.22);
}

.student{background:linear-gradient(135deg,#16a34a,#22c55e);}
.teacher{background:linear-gradient(135deg,#2563eb,#3b82f6);}
.admin{background:linear-gradient(135deg,#dc2626,#ef4444);}

.note{
  font-size:12px;
  color:#6b7280;
  margin-top:16px;
  line-height:1.5;
}

@media(max-width:420px){
  .brand{font-size:24px;}
  .portal{padding:26px 22px;}
}
</style>
</head>

<body>

<div class="portal">

  <div class="logo-frame">
    <img src="assets/logo.jpg" alt="Tesla Vedha Logo">
  </div>

  <div class="brand">Tesla Vedha</div>
  <div class="tagline">KTET · PSC · AI Learning Academy</div>

  <div class="divider"></div>

  <div class="actions">
    <a class="student" href="student_login.html">Student Login</a>
    <a class="teacher" href="teacher_login.html">Teacher Login</a>
    <a class="admin" href="admin-login.html">Admin Login</a>
  </div>

  <div class="note">
    Student and Teacher accounts are created and managed only by authorised
    Admins / Teachers of Tesla Vedha Academy.
  </div>

</div>

</body>
</html>
