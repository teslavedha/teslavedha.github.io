<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tesla Vedha Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --blue-1:#020617;
  --blue-2:#020f30;
  --blue-3:#0b2a6f;
  --blue-4:#1e40af;
  --green:#16a34a;
  --red:#dc2626;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  font-family:'Poppins',system-ui,sans-serif;

  /* ✅ FULL PREMIUM DARK BLUE BACKGROUND */
  background:
    radial-gradient(1200px 600px at 20% 0%, rgba(37,99,235,.35), transparent 60%),
    radial-gradient(1000px 600px at 90% 80%, rgba(30,64,175,.45), transparent 60%),
    linear-gradient(180deg, var(--blue-1), var(--blue-2));

  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

/* MAIN CONTAINER – NO WHITE */
.portal{
  width:100%;
  max-width:460px;
  background:
    linear-gradient(180deg, rgba(15,23,42,.85), rgba(2,6,23,.85));
  border-radius:26px;
  padding:32px 28px 30px;
  text-align:center;

  box-shadow:
    0 40px 80px rgba(0,0,0,.65),
    inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter: blur(18px);
}

/* LOGO */
.logo-frame{
  width:96px;
  height:96px;
  margin:0 auto 14px;
  border-radius:24px;
  background:linear-gradient(145deg,#020617,#020f30);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 18px 36px rgba(0,0,0,.65),
    inset 0 0 0 1px rgba(255,255,255,.08);
}
.logo-frame img{
  width:58px;
  height:auto;
}

/* TEXT */
.brand{
  font-size:28px;
  font-weight:700;
  color:#ffffff;
}
.tagline{
  font-size:13px;
  color:var(--muted);
  margin-top:6px;
}

.rule{
  height:1px;
  background:linear-gradient(90deg,transparent,#334155,transparent);
  margin:22px 0;
}

/* BUTTONS – PREMIUM */
.actions{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.actions a{
  position:relative;
  padding:15px;
  border-radius:14px;
  font-size:15px;
  font-weight:600;
  color:#ffffff;
  text-decoration:none;
  letter-spacing:.3px;
  overflow:hidden;

  box-shadow:
    0 14px 30px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.25);
  transition:transform .15s ease, box-shadow .15s ease;
}

/* shine */
.actions a::after{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:120%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);
  transition:left .6s ease;
}
.actions a:hover::after{left:120%;}
.actions a:hover{
  transform:translateY(-2px);
  box-shadow:0 24px 48px rgba(0,0,0,.8);
}

.student{background:linear-gradient(135deg,#16a34a,#22c55e);}
.teacher{background:linear-gradient(135deg,#2563eb,#60a5fa);}
.admin{background:linear-gradient(135deg,#dc2626,#f87171);}

.note{
  font-size:12px;
  color:#9ca3af;
  margin-top:18px;
  line-height:1.6;
}

@media(max-width:420px){
  .brand{font-size:24px;}
}
</style>
</head>

<body>

<div class="portal">

  <div class="logo-frame">
    <img src="assets/logo.jpg" alt="Tesla Vedha Logo">
  </div>

  <div class="brand">Tesla Vedha</div>
  <div class="tagline">KTET · PSC · AI Learning Academy</div>

  <div class="rule"></div>

  <div class="actions">
    <a class="student" href="student_login.html">Student Login</a>
    <a class="teacher" href="teacher_login.html">Teacher Login</a>
    <a class="admin" href="admin-login.html">Admin Login</a>
  </div>

  <div class="note">
    Student and Teacher accounts are created and managed only by authorised
    Admins / Teachers of Tesla Vedha Academy.
  </div>

</div>

</body>
</html>
