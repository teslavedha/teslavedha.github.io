<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tesla Vedha – Learning Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:Poppins, system-ui;
      background:linear-gradient(135deg,#1e3a8a,#3b82f6);
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      text-align:center;
    }
    .card{
      background:white;
      color:#0f172a;
      padding:32px 24px;
      border-radius:18px;
      max-width:380px;
      width:92%;
      box-shadow:0 18px 40px rgba(15,23,42,0.35);
    }
    h1{
      margin:0 0 4px;
      font-size:26px;
      font-weight:700;
    }
    h2{
      margin:0 0 18px;
      font-size:16px;
      font-weight:500;
      color:#64748b;
    }
    .btn{
      display:block;
      padding:12px;
      border-radius:10px;
      margin-top:10px;
      text-decoration:none;
      font-weight:600;
      color:white;
    }
    .student{ background:#16a34a; }
    .teacher{ background:#2563eb; }
    .admin{ background:#dc2626; }
    .btn:hover{ opacity:0.9; }
    small{
      display:block;
      margin-top:12px;
      font-size:12px;
      color:#6b7280;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tesla Vedha</h1>
    <h2>KTET · PSC · AI Learning Portal</h2>

    <a class="btn student" href="student_login.html">Student Login</a>
    <a class="btn teacher" href="teacher_login.html">Teacher Login</a>
    <a class="btn admin" href="admin-login.html">Admin Login</a>

    <small>All accounts are created and managed only by Admin / Teachers.</small>
  </div>
</body>
</html>
