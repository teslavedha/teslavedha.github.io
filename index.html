<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tesla Vedha Academy – Premium</title>
  
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --blue-dark:#0f2a5f;
  --blue-main:#1e40af;
  --blue-light:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --text:#0f172a;
  --muted:#64748b;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Poppins',system-ui,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(37,99,235,.25), transparent 55%),
    radial-gradient(900px 500px at 85% 90%, rgba(30,64,175,.35), transparent 55%),
    linear-gradient(180deg,#020617,#0f172a);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* MAIN GLASS CARD */
.portal{
  width:100%;
  max-width:460px;
  backdrop-filter: blur(16px) saturate(130%);
  -webkit-backdrop-filter: blur(16px) saturate(130%);
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.85),
    rgba(255,255,255,0.92)
  );
  border-radius:26px;
  box-shadow:
    0 30px 70px rgba(2,6,23,.65),
    inset 0 1px 0 rgba(255,255,255,.6);
  overflow:hidden;
}

/* HEADER */
.portal-header{
  padding:32px 24px 22px;
  text-align:center;
  background:
    radial-gradient(200px 120px at top, rgba(37,99,235,.18), transparent 70%);
}

/* LOGO */
.logo-box{
  width:92px;
  height:92px;
  margin:0 auto 14px;
  border-radius:20px;
  background:rgba(15,23,42,.85);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 14px 28px rgba(15,23,42,.45),
    inset 0 0 0 1px rgba(255,255,255,.12);
}
.logo-box img{
  width:56px;
  height:auto;
}

/* BRAND */
.brand{
  font-size:28px;
  font-weight:700;
  color:var(--blue-dark);
  letter-spacing:.4px;
}
.tagline{
  font-size:13px;
  color:var(--muted);
  margin-top:6px;
}

/* BODY */
.portal-body{
  padding:22px 24px 26px;
}

.rule{
  height:1px;
  background:linear-gradient(90deg,transparent,#e5e7eb,transparent);
  margin-bottom:22px;
}

/* BUTTONS */
.action{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.action a{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:14px;
  border-radius:14px;
  font-size:15px;
  font-weight:600;
  color:white;
  text-decoration:none;
  letter-spacing:.2px;
  box-shadow:0 12px 26px rgba(15,23,42,.22);
  transition:transform .15s ease, box-shadow .15s ease, opacity .15s;
}

.action a:hover{
  transform:translateY(-2px);
  box-shadow:0 18px 38px rgba(15,23,42,.28);
}
.action a:active{
  transform:translateY(0);
}

.student{background:linear-gradient(135deg,#16a34a,#22c55e);}
.teacher{background:linear-gradient(135deg,#2563eb,#3b82f6);}
.admin{background:linear-gradient(135deg,#dc2626,#ef4444);}

/* FOOTER */
.footer-note{
  margin-top:18px;
  font-size:12px;
  text-align:center;
  color:#475569;
  line-height:1.6;
}

@media(max-width:420px){
  .brand{font-size:24px;}
  .logo-box{width:82px;height:82px;}
}
</style>
</head>

<body>

<section class="portal">

  <header class="portal-header">
    <div class="logo-box">
      <img src="assets/logo.jpg" alt="Tesla Vedha Logo">
    </div>

    <div class="brand">Tesla Vedha</div>
    <div class="tagline">KTET · PSC · AI Learning Academy</div>
  </header>

  <div class="portal-body">
    <div class="rule"></div>

    <div class="action">
      <a class="student" href="student_login.html">Student Login</a>
      <a class="teacher" href="teacher_login.html">Teacher Login</a>
      <a class="admin" href="admin-login.html">Admin Login</a>
    </div>

    <div class="footer-note">
      Student and Teacher accounts are created and managed only by authorised
      Admins / Teachers of Tesla Vedha Academy.
    </div>
  </div>

</section>

</body>
</html>
