<!DOCTYPE html>
<html>
<head>
    <title>Tesla Vedha Institution</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .header {
            background: white;
            padding: 20px;
            border-bottom: 3px solid #0078ff;
        }
        .logo {
            width: 150px;
            border-radius: 10px;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }
        .login-box {
            margin: 30px auto;
            width: 300px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border: 1px solid #aaa;
            border-radius: 5px;
        }
        button {
            width: 95%;
            padding: 10px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="photo_2025-11-19_13-35-50.jpg" class="logo">
        <div class="title">TESLA VEDHA INSTITUTION</div>
    </div>

    <div class="login-box">
        <h3>Login</h3>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button>Login</button>
    </div>

</body>
</html>
