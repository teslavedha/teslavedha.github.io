<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KTET Learning Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#f1f5f9;
}
header{
    background:linear-gradient(90deg,#1e3a8a,#3b82f6);
    color:white;
    padding:22px;
    text-align:center;
    font-size:24px;
    font-weight:600;
}
.container{
    max-width:900px;
    margin:20px auto;
    padding:10px;
}
.card{
    background:white;
    padding:18px;
    border-radius:14px;
    margin-bottom:16px;
    box-shadow:0 6px 18px rgba(0,0,0,.1);
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.title{
    font-size:18px;
    font-weight:600;
    color:#1e40af;
}
.desc{
    font-size:13px;
    color:#555;
}
.btn{
    background:#2563eb;
    color:white;
    padding:10px 16px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
}
.logout{
    background:#dc2626;
    padding:6px 12px;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
    margin-top:10px;
    display:inline-block;
}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  YOUR_FIREBASE_CONFIG_HERE
};
firebase.initializeApp(firebaseConfig);

firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    window.location.href="student_login.html";
  }
});

function logout(){
  firebase.auth().signOut().then(()=>{
    window.location.href="student_login.html";
  });
}
</script>
</head>

<body>

<header>
KTET Learning Portal
<br>
<span class="logout" onclick="logout()">Logout</span>
</header>

<div class="container">

<!-- CATEGORY 1 -->
<div class="card">
  <div>
    <div class="title">KTET Category 1</div>
    <div class="desc">Malayalam | English | Maths | EVS | Psychology</div>
  </div>
  <a class="btn" href="cat1_subjects.html">Open</a>
</div>

<!-- CATEGORY 2 -->
<div class="card">
  <div>
    <div class="title">KTET Category 2</div>
    <div class="desc">English | Maths | Science | Social Science</div>
  </div>
  <a class="btn" href="cat2_subjects.html">Open</a>
</div>

</div>

</body>
</html>
