<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA + Fullscreen App Mode -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">

    <title>KTET Category 1 – Dashboard</title>

    <!-- Basic Styles -->
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #005bea, #00c6fb);
            color: #fff;
        }

        .container {
            width: 92%;
            margin: 0 auto;
            padding-top: 20px;
        }

        .card {
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .card h2 {
            margin-top: 0;
            font-size: 22px;
        }

        .lessons button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            font-size: 16px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <h2>KTET Category 1</h2>
            <h3>Dashboard</h3>

            <p><strong>Course Progress</strong></p>

            <div class="lessons">
                <button onclick="location.href='malayalam.html'">Malayalam – Start</button>
                <button onclick="location.href='english.html'">English – Start</button>
                <button onclick="location.href='maths.html'">Maths – Start</button>
                <button onclick="location.href='psychology.html'">Psychology – Start</button>
                <button onclick="location.href='evs.html'">EVS – Start</button>
            </div>
        </div>

        <p style="text-align:center; margin-top:30px; color:#e0e0e0;">
            © 2025 Teslavedha Edu Tech Solution
        </p>
    </div>

    <!-- Service Worker Registration -->
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
        }
    </script>

</body>
</html>
