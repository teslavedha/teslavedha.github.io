<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tesla Vedha Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:Poppins, system-ui;
      min-height:100vh;
      background:linear-gradient(135deg,#1e3a8a,#2563eb);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .card{
      background:white;
      border-radius:18px;
      padding:36px 28px 32px;
      width:92%;
      max-width:410px;
      text-align:center;
      box-shadow:0 25px 50px rgba(0,0,0,0.28);
    }

    /* LOGO AREA */
    .logo-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-bottom:20px;
    }

    .logo-wrap img{
      width:82px;
      height:auto;
      margin-bottom:10px;
    }

    .logo-text{
      font-size:26px;
      font-weight:700;
      color:#1e3a8a;
      line-height:1.2;
    }

    .tagline{
      font-size:13px;
      color:#64748b;
      margin-top:4px;
    }

    .divider{
      height:1px;
      background:#e5e7eb;
      margin:22px 0;
    }

    .btn{
      display:block;
      width:100%;
      padding:14px;
      border-radius:10px;
      font-size:15px;
      font-weight:600;
      color:white;
      text-decoration:none;
      margin-bottom:10px;
      transition:transform .15s ease,box-shadow .15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(0,0,0,.15);
    }

    .student{ background:#16a34a; }
    .teacher{ background:#2563eb; }
    .admin{ background:#dc2626; }

    .note{
      font-size:12px;
      color:#6b7280;
      margin-top:14px;
      line-height:1.4;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="logo-wrap">
      <!-- YOUR REAL LOGO -->
      <img src="photo_2025-11-19_13-35-50.jpg" alt="Tesla Vedha Logo">

      <div class="logo-text">Tesla Vedha</div>
      <div class="tagline">KTET · PSC · AI Learning Academy</div>
    </div>

    <div class="divider"></div>

    <a class="btn student" href="student_login.html">Student Login</a>
    <a class="btn teacher" href="teacher_login.html">Teacher Login</a>
    <a class="btn admin" href="admin-login.html">Admin Login</a>

    <div class="note">
      All student and teacher accounts are created and managed only by authorised
      Admins / Teachers.
    </div>

  </div>

</body>
</html>
