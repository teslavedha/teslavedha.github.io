<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Category 2 Malayalam – Videos</title>

<style>
body{margin:0;font-family:Poppins;background:#eef3ff}
header{background:#1e40af;color:white;padding:20px;text-align:center;font-size:22px}
.container{max-width:900px;margin:auto;padding:12px}
.box{background:white;padding:12px;border-radius:14px;margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.1)}
iframe{width:100%;height:220px;border-radius:10px;border:none}
.placeholder{
height:220px;background:#dbeafe;
display:flex;align-items:center;justify-content:center;
font-weight:600;color:#1e40af;border-radius:10px}
</style>
</head>

<body>
<header>Malayalam – Video Classes</header>

<div class="container" id="list"></div>

<script>
const key = "videos_cat2_malayalam";
let data = JSON.parse(localStorage.getItem(key) || "[]");
let html = "";
for(let i=0;i<10;i++){
html += `<div class="box">${
data[i] ?
`<iframe src="https://www.youtube.com/embed/${data[i]}" allowfullscreen></iframe>`
:
`<div class="placeholder">Video ${i+1} Not Set</div>`
}</div>`;
}
document.getElementById("list").innerHTML = html;
</script>

</body>
</html>
