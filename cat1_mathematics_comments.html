<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematics – Comments</title>

    <style>
        body {margin:0;background:#edf8f5;font-family:'Poppins',sans-serif;}
        header {
            background:linear-gradient(90deg,#059669,#10b981);
            padding:20px;text-align:center;color:white;
            font-size:22px;font-weight:600;border-bottom-left-radius:15px;border-bottom-right-radius:15px;
        }
        .container {max-width:900px;margin:auto;padding:15px;}
        .comment-box {background:white;padding:15px;border-radius:14px;box-shadow:0 4px 14px rgba(0,0,0,0.12);margin-bottom:20px;}
        textarea,input {width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:8px;}
        .btn {
            background:#059669;color:white;padding:10px 18px;border-radius:10px;
            font-weight:600;border:none;margin-top:10px;cursor:pointer;
        }
        .comment {background:white;padding:12px;border-radius:14px;margin-bottom:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
        .meta {font-size:13px;color:#6b7280;}
    </style>

    <script>
        function postComment(e){
            e.preventDefault();
            let name=document.getElementById("name").value || "Anonymous";
            let msg=document.getElementById("msg").value;
            if(msg.trim()==""){alert("Enter comment");return;}

            let box=document.getElementById("comments");
            let now=new Date().toLocaleString();

            box.innerHTML = 
            `<div class="comment">
                <b>${name}</b> <div class="meta">${now}</div>
                <div>${msg}</div>
            </div>` + box.innerHTML;

            document.getElementById("form").reset();
        }
    </script>

</head>

<body>

<header>Mathematics – Comments</header>

<div class="container">

    <form id="form" onsubmit="postComment(event)" class="comment-box">
        <input id="name" placeholder="Your name (optional)">
        <textarea id="msg" rows="3" placeholder="Write your comment..."></textarea>
        <button class="btn">Post Comment</button>
    </form>

    <div id="comments"></div>

</div>

</body>
</html>
