<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Classes</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; padding: 20px; }
        .card { background: white; padding: 18px; margin-bottom: 12px; 
                border-radius: 10px; font-size: 18px; font-weight: bold; }
        .card a { text-decoration: none; color: #005eff; }
    </style>
</head>
<body>

<h2>വീഡിയോ ക്ലാസുകൾ</h2>

<script>
for (let i = 1; i <= 20; i++) {
    document.write(<div class='card'><a href="class${i}.html">ക്ലാസ് ${i}</a></div>);
}
</script>

</body>
</html>
