<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KTET Category 2 – Science</title>

<style>
    body { font-family:'Poppins', sans-serif; margin:0; background:#f4f6fa; }
    header { background:#2a4d9b; padding:20px; color:#fff; text-align:center;
        font-size:26px; font-weight:700; }

    .banner {
        background:url('https://images.pexels.com/photos/256262/pexels-photo-256262.jpeg') center/cover;
        height:180px; border-radius:0 0 20px 20px;
        display:flex; align-items:center; justify-content:center;
        color:white; font-size:28px; font-weight:700;
        text-shadow:0 4px 10px rgba(0,0,0,0.5);
    }

    .section { padding:25px; }
    h2 { margin-bottom:15px; color:#222; }

    .grid {
        display:grid; gap:20px;
        grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    }

    .card {
        background:white; padding:15px; border-radius:15px;
        box-shadow:0 8px 20px rgba(0,0,0,0.08);
        transition:.3s; text-align:center;
    }

    .card:hover { transform:translateY(-5px); }
    .thumb {
        width:100%; height:150px; border-radius:12px;
        object-fit:cover; margin-bottom:10px;
    }

    button {
        background:#2a4d9b; border:none; padding:10px 20px; color:#fff;
        border-radius:10px; font-size:14px; cursor:pointer;
        transition:0.3s;
    }
    button:hover { background:#1f3f82; }

    /* MCQ Section */
    .mcq-box {
        background:white; padding:20px; border-radius:15px;
        box-shadow:0 8px 20px rgba(0,0,0,0.08);
    }

    .option { margin:8px 0; padding:10px; background:#eef2ff; border-radius:10px; cursor:pointer; }
    .option:hover { background:#dde4ff; }
    #result { margin-top:10px; font-weight:600; }

    /* Comments */
    textarea {
        width:100%; padding:12px; border-radius:12px; border:1px solid #ccc; resize:none;
    }
    .submit-btn { margin-top:10px; background:#27ae60; }
</style>
</head>
<body>

<header>KTET Category 2 – Science</header>

<div class="banner">Science</div>

<!-- VIDEO SECTION -->
<div class="section" id="videos">
    <h2>📺 Video Classes</h2>

    <div class="grid">

        <div class="card">
            <img class="thumb" src="https://i.ytimg.com/vi/4WwAKi-VZ9U/maxresdefault.jpg">
            <button>Biology Basics</button>
        </div>

        <div class="card">
            <img class="thumb" src="https://i.ytimg.com/vi/9Z8I2Fw5WMg/maxresdefault.jpg">
            <button>Physics Concepts</button>
        </div>

    </div>
</div>

<!-- NOTES SECTION -->
<div class="section" id="notes">
    <h2>📚 PDF Notes</h2>

    <div class="grid">

        <div class="card">
            <h3>Biology Notes</h3>
            <button>Download PDF</button>
        </div>

        <div class="card">
            <h3>Physics Notes</h3>
            <button>Download PDF</button>
        </div>

    </div>
</div>

<!-- MCQ SECTION -->
<div class="section" id="mcq">
    <h2>📝 MCQ Practice</h2>

    <div class="mcq-box">

        <p><b>Q1:</b> Who is known as the father of modern physics?</p>

        <div class="option" onclick="check('correct')">Albert Einstein</div>
        <div class="option" onclick="check('wrong')">Isaac Newton</div>
        <div class="option" onclick="check('wrong')">Galileo</div>

        <div id="result"></div>

    </div>
</div>

<!-- COMMENTS SECTION -->
<div class="section" id="comments">
    <h2>💬 Comments</h2>

    <textarea rows="4" placeholder="Type your comment..."></textarea>
    <button class="submit-btn">Submit</button>
</div>

<script>
function check(ans){
    document.getElementById('result').innerHTML =
        ans === "correct" ? "✅ Correct!" : "❌ Wrong Answer";
}
</script>

</body>
</html>
