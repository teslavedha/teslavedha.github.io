<!DOCTYPE html>
<html>
<head>
    <title>KTET Category 1 Course</title>

    <!-- External CSS file -->
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 40px;
        }

        .container {
            width: 95%;
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #004aad;
            font-size: 28px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #1e88e5;
            color: white;
            padding: 12px;
            text-align: left;
            font-size: 17px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 16px;
        }

        tr:hover {
            background: #f1f1f1;
        }
    </style>

</head>
<body>

    <div class="container">
        <h1>KTET Category 1</h1>

        <table>
            <tr>
                <th>Subject</th>
                <th>Topics</th>
            </tr>

            <tr>
                <td>Malayalam</td>
                <td>Grammar, Literature, Language Skills</td>
            </tr>

            <tr>
                <td>English</td>
                <td>Basics, Grammar, Comprehension</td>
            </tr>

            <tr>
                <td>Mathematics</td>
                <td>Arithmetic, Geometry, Logical Problems</td>
            </tr>

            <tr>
                <td>Psychology</td>
                <td>Child Development, Learning, Teaching Methods</td>
            </tr>

            <tr>
                <td>EVS</td>
                <td>Environment, Science Basics, GK</td>
            </tr>

            <tr>
                <td><b>Course Duration</b></td>
                <td><b>6 Months</b></td>
            </tr>

        </table>
    </div>

</body>
</html>
