<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTET Malayalam Video Classes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 0;
        }

        header {
            background: #007bff;
            padding: 15px;
            text-align: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .video-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .video-card iframe {
            width: 100%;
            height: 220px;
            border-radius: 10px;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .desc {
            font-size: 14px;
            color: #444;
        }
    </style>
</head>

<body>

<header>KTET Malayalam Video Classes</header>

<div class="container">

    <!-- Video 1 -->
    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/VIDEO_ID_1" allowfullscreen></iframe>
        <div class="title">പാഠം 1 – പരിചയം</div>
        <div class="desc">KTET ഒരുക്കത്തിനുള്ള അടിസ്ഥാന വിശദീകരണം.</div>
    </div>

    <!-- Video 2 -->
    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/VIDEO_ID_2" allowfullscreen></iframe>
        <div class="title">പാഠം 2 – മലയാളം ഭാഷയുടെ അടിസ്ഥാനങ്ങൾ</div>
        <div class="desc">പ്രധാന ഭാഷാഭാഗങ്ങൾ, പരീക്ഷയിൽ വരാവുന്ന ചോദ്യങ്ങൾ.</div>
    </div>

    <!-- Add as many videos as you want by copying this block -->
</div>

</body>
</html>
