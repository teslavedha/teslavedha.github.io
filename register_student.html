<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Student</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">

<style>
body {
    background:#ecfeff;
    font-family: Arial, sans-serif;
    padding: 20px;
}

.box {
    max-width: 560px;
    margin: auto;
    background: #ffffff;
    padding: 26px;
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}

h2 {
    text-align: center;
    color: #0369a1;
    margin-bottom: 20px;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 12px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #bbb;
    font-size: 15px;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    font-size: 18px;
    background: #0284c7;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #0369a1;
}

.success {
    color: green;
    font-weight: bold;
    margin-top: 12px;
    text-align: center;
}

.error {
    color: red;
    font-weight: bold;
    margin-top: 12px;
    text-align: center;
}
</style>
</head>

<body>

<!-- FIREBASE -->
<script src="firebase_init.js"></script>

<div class="box">
    <h2>Register Student</h2>

    <label>Student Name</label>
    <input type="text" id="name" placeholder="Student full name">

    <label>Username (Email or Mobile)</label>
    <input type="text" id="username" placeholder="Email or mobile number">

    <label>Password</label>
    <input type="text" id="password" placeholder="Set password">

    <label>Course</label>
    <select id="course">
        <option value="KTET">KTET</option>
        <option value="PSC">PSC</option>
        <option value="SET">SET</option>
        <option value="AI">AI Courses</option>
    </select>

    <button onclick="registerStudent()">Register Student</button>

    <p id="msg"></p>
</div>

<script>
async function registerStudent() {

    const name     = document.getElementById("name").value.trim();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const course   = document.getElementById("course").value;
    const msg      = document.getElementById("msg");

    msg.textContent = "";

    if (!name || !username || !password) {
        msg.textContent = "Please fill all fields.";
        msg.className = "error";
        return;
    }

    try {
        await db.collection("students").add({
            name,
            username,
            password,
            course,
            createdAt: Date.now()
        });

        msg.textContent = "Student registered successfully!";
        msg.className = "success";

        document.getElementById("name").value = "";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";

    } catch (err) {
        msg.textContent = "Registration failed: " + err.message;
        msg.className = "error";
    }
}
</script>

</body>
</html>
