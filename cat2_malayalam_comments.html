<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malayalam – Comments</title>

<style>
body { margin:0; font-family:Arial; background:#f5f7fb; }
header { background:#0057b7; color:white; padding:22px; text-align:center;
        font-size:26px; font-weight:bold; }
.container { width:90%; margin:auto; padding-top:30px; }
textarea {
    width:100%; height:150px; padding:12px; font-size:16px;
    border-radius:10px; border:1px solid #ccc;
}
button {
    padding:12px 25px; background:#0057b7; color:white;
    border:none; margin-top:10px; border-radius:8px;
    font-size:18px; cursor:pointer;
}
</style>

</head>
<body>

<header>Malayalam – Comments</header>

<div class="container">
<textarea placeholder="Write your comment..."></textarea>
<button>Submit</button>
</div>

</body>
</html>
