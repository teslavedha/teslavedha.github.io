<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerala PSC – Degree Level</title>

    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(#eef2f3, #dfe9f3);
        }

        .header {
            background: #004c98;
            padding: 22px;
            text-align: center;
            color: white;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .container {
            max-width: 900px;
            margin: 35px auto;
            padding: 0 20px;
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 22px;
        }

        .subject-card {
            background: white;
            padding: 28px 22px;
            border-radius: 16px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.12);
            text-align: center;
            transition: 0.35s;
            border: 1px solid #e5e5e5;
        }

        .subject-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 28px rgba(0,0,0,0.18);
        }

        .subject-title {
            font-size: 20px;
            font-weight: 600;
            color: #003b73;
            margin-bottom: 8px;
        }

        .tag {
            display: inline-block;
            margin-top: 6px;
            padding: 6px 14px;
            background: #003b73;
            color: white;
            font-size: 13px;
            border-radius: 50px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="header">KERALA PSC – DEGREE LEVEL</div>

    <div class="container">
        <div class="subject-grid">

            <a href="#" style="text-decoration:none;">
                <div class="subject-card">
                    <div class="subject-title">Malayalam</div>
                    <div class="tag">PSC Degree Level</div>
                </div>
            </a>

            <a href="#" style="text-decoration:none;">
                <div class="subject-card">
                    <div class="subject-title">English</div>
                    <div class="tag">PSC Degree Level</div>
                </div>
            </a>

            <a href="#" style="text-decoration:none;">
                <div class="subject-card">
                    <div class="subject-title">Maths</div>
                    <div class="tag">PSC Degree Level</div>
                </div>
            </a>

            <a href="#" style="text-decoration:none;">
                <div class="subject-card">
                    <div class="subject-title">GK</div>
                    <div class="tag">PSC Degree Level</div>
                </div>
            </a>

            <a href="#" style="text-decoration:none;">
                <div class="subject-card">
                    <div class="subject-title">Current Affairs</div>
                    <div class="tag">PSC Degree Level</div>
                </div>
            </a>

        </div>
    </div>

</body>
</html>
