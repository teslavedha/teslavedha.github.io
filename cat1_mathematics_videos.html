<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematics – Video Classes</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #edf8f5;
        }

        header {
            background: linear-gradient(90deg, #059669, #10b981);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        .container {
            padding: 15px;
            max-width: 900px;
            margin: auto;
        }

        .video-card {
            background: white;
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.12);
        }

        iframe {
            width: 100%;
            height: 220px;
            border-radius: 10px;
        }

        .title {
            margin-top: 10px;
            font-weight: 600;
            font-size: 16px;
            color: #065f46;
        }

        .meta {
            font-size: 13px;
            color: #4b5563;
        }
    </style>
</head>

<body>

<header>Mathematics – Video Classes</header>

<div class="container">

    <!-- 10 video slots (replace VIDEO_ID) -->
    <div class="video-card">
        <iframe src="https://www.youtube.com/embed/VIDEO_ID_1" allowfullscreen></iframe>
        <div class="title">Lesson 1 – Basic Number Concepts</div>
        <div class="meta">Duration: 20 min</div>
    </div>

    <!-- Repeat for lessons 2 to 10 -->
</div>

</body>
</html>
