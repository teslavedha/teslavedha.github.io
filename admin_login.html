<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <style>
        body {
            background: #f7f7f7;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0px 2px 12px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #d81b60;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #d81b60;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #ad164c;
        }

        .error {
            color: red;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Admin Login</h2>

        <input type="text" id="adminUser" placeholder="Enter username">
        <input type="password" id="adminPass" placeholder="Enter password">

        <button onclick="adminLogin()">Login</button>

        <div id="error" class="error">Invalid username or password</div>
    </div>

<script>
function adminLogin() {
    let user = document.getElementById("adminUser").value;
    let pass = document.getElementById("adminPass").value;

    // DEFAULT ADMIN CREDENTIALS
    let adminUser = "admin";
    let adminPass = "tesla123";

    if (user === adminUser && pass === adminPass) {
        // LOGIN SUCCESS
        window.location.href = "admin.html"; 
    } else {
        document.getElementById("error").style.display = "block";
    }
}
</script>

</body>
</html>
