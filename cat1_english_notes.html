<!doctype html>
<html>
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>English — Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
 body{font-family:Poppins, sans-serif;margin:0;background:#f7f7ff}
 header{background:linear-gradient(90deg,#6d28d9,#8b5cf6);color:#fff;padding:18px;text-align:center;border-bottom-left-radius:14px;border-bottom-right-radius:14px}
 .container{max-width:980px;margin:18px auto;padding:12px}
 .card{background:#fff;border-radius:12px;padding:12px;margin-bottom:14px;box-shadow:0 6px 18px rgba(2,6,23,0.05);display:flex;justify-content:space-between;align-items:center}
 .btn{background:#6d28d9;color:#fff;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:700}
 .muted{color:#64748b}
</style>
</head>
<body>
<header><strong>English — PDF Notes</strong></header>
<div class="container" id="notes"></div>

<script>
const SUBJECT='english', storageKey='ktet_cat1_data_v1';
function loadNotes(){
  const raw=localStorage.getItem(storageKey); const data=raw?JSON.parse(raw):{};
  const notes = (data[SUBJECT] && data[SUBJECT].notes) ? data[SUBJECT].notes : Array(5).fill('');
  const box=document.getElementById('notes'); let html='';
  for(let i=0;i<5;i++){
    const url = notes[i]||'';
    html += `<div class="card"><div><div style="font-weight:700">PDF ${i+1}</div><div class="muted">Notes PDF</div></div>`;
    html += `<div>` + (url ? `<a class="btn" href="${url}" target="_blank">View PDF</a>` : `<span class="muted">Not set</span>`) + `</div></div>`;
  }
  box.innerHTML=html;
}
loadNotes();
</script>
</body>
</html>
