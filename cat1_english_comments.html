<!doctype html>
<html>
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>English — Comments</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
 body{font-family:Poppins, sans-serif;margin:0;background:#f7f7ff}
 header{background:linear-gradient(90deg,#6d28d9,#8b5cf6);color:#fff;padding:18px;text-align:center;border-bottom-left-radius:14px;border-bottom-right-radius:14px}
 .container{max-width:980px;margin:18px auto;padding:12px}
 .box{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 6px 18px rgba(2,6,23,0.05)}
 input,textarea{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #e2e8f0}
 .btn{background:#6d28d9;color:#fff;padding:10px 12px;border-radius:8px;border:0;cursor:pointer;font-weight:700}
 .comment{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #e6eefb}
 .meta{color:#64748b;font-size:13px}
</style>
</head>
<body>
<header><strong>English — Comments</strong></header>
<div class="container">
  <div class="box">
    <input id="name" placeholder="Your name (optional)"/>
    <textarea id="text" rows="3" placeholder="Write your question or feedback..."></textarea>
    <div style="margin-top:8px"><button class="btn" onclick="post()">Post Comment</button></div>
  </div>

  <div id="list"></div>
</div>

<script>
const SUBJECT='english';
const keyComments='ktet_cat1_comments_v1';

function getComments(){
  const raw = localStorage.getItem(keyComments);
  const obj = raw ? JSON.parse(raw) : {};
  return obj[SUBJECT] ? obj[SUBJECT] : [];
}
function saveComments(arr){
  const raw = localStorage.getItem(keyComments);
  const obj = raw ? JSON.parse(raw) : {};
  obj[SUBJECT]=arr;
  localStorage.setItem(keyComments, JSON.stringify(obj));
}
function render(){
  const arr = getComments();
  const box = document.getElementById('list');
  if(arr.length===0){ box.innerHTML='<div class="meta">No comments yet.</div>'; return;}
  let html='';
  arr.slice().reverse().forEach(c=>{
    html += `<div class="comment"><div style="display:flex;justify-content:space-between"><div style="font-weight:700">${escapeHtml(c.name)}</div><div class="meta">${escapeHtml(c.time)}</div></div><div style="margin-top:8px">${escapeHtml(c.text)}</div></div>`;
  });
  box.innerHTML=html;
}
function post(){
  const name=document.getElementById('name').value.trim()||'Anonymous';
  const text=document.getElementById('text').value.trim();
  if(!text) return alert('Write a comment');
  const arr = getComments();
  arr.push({name,text,time:new Date().toLocaleString()});
  saveComments(arr);
  document.getElementById('text').value='';
  render();
}
function escapeHtml(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
render();
</script>
</body>
</html>
