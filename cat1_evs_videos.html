<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EVS — Videos</title>
<style>
  body{margin:0;font-family:Poppins,system-ui;background:#eefaf6}
  header{background:linear-gradient(90deg,#059669,#10b981);color:#fff;padding:20px;text-align:center;font-weight:700}
  .wrap{max-width:980px;margin:18px auto;padding:12px}
  .slot{background:#fff;border-radius:12px;padding:12px;margin-bottom:14px;box-shadow:0 6px 18px rgba(2,6,23,0.06)}
  iframe{width:100%;height:220px;border-radius:10px;border:0}
  .placeholder{height:220px;border-radius:10px;background:#e6f6f1;display:flex;align-items:center;justify-content:center;color:#0f766e;font-weight:700}
</style>
</head>
<body>
<header>EVS – Video Classes</header>
<div class="wrap" id="list">Loading videos…</div>

<script>
function load(){
  const key = 'videos_evs';
  const raw = localStorage.getItem(key);
  const ids = Array(10).fill('');
  if(raw){
    try{ const arr = JSON.parse(raw); for(let i=0;i<arr.length;i++) ids[i]=arr[i]; }catch(e){}
  }
  let html = '';
  for(let i=0;i<10;i++){
    html += `<div class="slot">${
      ids[i]
      ? `<iframe src="https://www.youtube.com/embed/${ids[i]}" allowfullscreen></iframe>`
      : `<div class="placeholder">Video ${i+1} Not Set</div>`
    }</div>`;
  }
  document.getElementById('list').innerHTML = html;
}
window.addEventListener('load', load);
</script>
</body>
</html>
