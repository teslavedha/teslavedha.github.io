<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 1 – Video Classes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f7;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* FIXED SIDE SCROLL */
        }

        .container {
            width: 100%;
            max-width: 450px;  /* FIXED WIDTH */
            margin: auto;
            padding: 15px;
        }

        h1 {
            text-align: center;
            color: #222;
        }

        .video-box {
            background: #fff;
            padding: 15px;
            margin: 20px 0;
            border-radius: 17px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 220px;
            border-radius: 10px;
            border: none;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📘 Chapter 1 – Video Classes</h1>

        <!-- VIDEO 1 -->
        <div class="video-box">
            <div class="title">Class 1</div>
            <iframe src="https://www.youtube.com/embed/XXXXXX" allowfullscreen></iframe>
        </div>

        <!-- VIDEO 2 -->
        <div class="video-box">
            <div class="title">Class 2</div>
            <iframe src="https://www.youtube.com/embed/XXXXXX" allowfullscreen></iframe>
        </div>

        <!-- VIDEO 3 -->
        <div class="video-box">
            <div class="title">Class 3</div>
            <iframe src="https://www.youtube.com/embed/XXXXXX" allowfullscreen></iframe>
        </div>

        <!-- Add more videos here -->
    </div>

</body>
</html>
